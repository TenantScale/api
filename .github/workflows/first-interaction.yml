name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            👋 Thanks for opening your first issue in **TenantScale API**! We're building the control plane for multi-tenant SaaS — thanks for helping out.

            Please check our [Contributing Guide](https://github.com/TenantScale/api/blob/main/CONTRIBUTING.md).
          pr-message: |
            🎉 Thanks for opening your first pull request in **TenantScale API**!

            Quick checklist:
            - ✅ Commits have DCO sign-off (`git commit -s`)
            - ✅ `pnpm test` and `pnpm build` pass locally
            - ✅ Tests updated for new functionality

            Welcome aboard! 🚀
