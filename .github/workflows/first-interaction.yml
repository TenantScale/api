name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const isPR = context.payload.pull_request !== undefined;
            const actor = context.actor;

            // Query the API for the actor's previous PRs/issues — per_page=2 is cheapest
            // to reliably detect "first" (length 1 = first, 2+ = returning)
            let existingCount;
            if (isPR) {
              const { data: existing } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                author: actor,
                per_page: 2,
              });
              existingCount = existing.length;
            } else {
              const { data: existing } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                creator: actor,
                per_page: 2,
                filter: 'all',
              });
              // Exclude PRs from the count (issues.listForRepo returns both)
              existingCount = existing.filter(i => !i.pull_request).length;
            }

            const isFirst = existingCount === 1;

            if (isFirst) {
              const message = isPR
                ? `🎉 Thanks for opening your first pull request in **TenantScale API**!

            Quick checklist:
            - ✅ Commits have DCO sign-off (\`git commit -s\`)
            - ✅ \`pnpm test\` and \`pnpm build\` pass locally
            - ✅ Tests updated for new functionality

            Welcome aboard! 🚀`
                : `👋 Thanks for opening your first issue in **TenantScale API**! We're building the control plane for multi-tenant SaaS — thanks for helping out.

            Please check our [Contributing Guide](https://github.com/TenantScale/api/blob/main/CONTRIBUTING.md).`;

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: message,
              });
            }
